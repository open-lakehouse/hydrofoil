# Coverage is reported but never blocks a PR while it beds in. Both project and
# patch statuses are informational, so a coverage drop shows up in the Codecov
# comment/status without turning the check red. Tighten (drop `informational`,
# add a `target`) once a baseline is trusted.
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

# Exclude code we never want counted against coverage. The big skew is committed
# codegen: buffa/connect-rust + prost/tonic output is thousands of lines of
# machine-generated impls that tests never exercise directly, which drags the
# denominator down and makes the percentage meaningless. Also drop examples and
# test helpers (exercised by running them, not by assertions).
#
# Paths are matched against the report's workspace-relative file paths. Keep this
# in sync with the `src/generated`, `src/gen`, and generated-proto trees (every
# committed file carries an `@generated` / `DO NOT EDIT` header). Regenerate with
# `just hydrofoil-gen` / `just portal-gen` / `buf generate`.
ignore:
  - "**/generated/**" # buffa + connect-rust output (hydrofoil, portal)
  - "**/src/gen/**" # prost/tonic output (cedar-oci, common: spark/delta connect)
  - "**/examples/**" # runnable examples, not unit-tested
  - "**/tests/**" # integration test harnesses
  - "**/benches/**"

# Public-repo tokenless upload; no CODECOV_TOKEN secret required.
codecov:
  require_ci_to_pass: false

comment:
  layout: "reach, diff, flags, files"
  behavior: default
