name: open-lakehouse

include:
  - path: ./services/envoy.yaml
    project_directory: .
  - path: ./services/seaweedfs.yaml
    project_directory: .
  - path: ./services/postgres.yaml
    project_directory: .
  - path: ./services/unity-catalog.yaml
    project_directory: .
  - path: ./services/mlflow.yaml
    project_directory: .
  - path: ./services/marquez.yaml
    project_directory: .
  - path: ./services/notebooks.yaml
    project_directory: .

configs:
  # Unity Catalog server/hibernate properties, referenced by the unity-catalog service.
  uc_server_properties:
    file: ./docker/unity-catalog/${UC_SERVER_PROPERTIES:-server.properties}
  uc_hibernate_properties:
    file: ./docker/unity-catalog/${UC_HIBERNATE_PROPERTIES:-hibernate.properties}
  # marimo user config (AI assistant), mounted into the marimo service.
  marimo_config:
    file: ./docker/marimo/marimo.toml
