name: open-lakehouse-local

configs:
  uc_server_properties:
    file: ./docker/unity-catalog/server-live.properties
  uc_hibernate_properties:
    file: ./docker/unity-catalog/hibernate.properties

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./.data/db-local:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d unitycatalog",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  unity-catalog:
    image: ghcr.io/roeap/unitycatalog:v0.0.0-dev-3
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: ["./bin/start-uc-server"]
    ports:
      - "${UC_PORT:-8081}:8081"
    configs:
      - source: uc_server_properties
        target: /home/unitycatalog/etc/conf/server.properties
      - source: uc_hibernate_properties
        target: /home/unitycatalog/etc/conf/hibernate.properties
    healthcheck:
      test:
        ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/8081' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
