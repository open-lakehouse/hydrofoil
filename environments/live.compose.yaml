name: open-lakehouse-live

configs:
  uc_server_properties:
    file: ./config/live/server.properties
  uc_hibernate_properties:
    file: ./config/live/hibernate.properties
  marimo_config:
    file: ./config/live/marimo.toml
  envoy_config:
    file: ./config/live/envoy.yaml
  lineage_service_config:
    file: ./config/live/lineage-service.toml
  hydrofoil_config:
    file: ./config/live/hydrofoil.toml

include:
  - path: ./services/envoy.yaml
    project_directory: .
  - path: ./services/postgres.yaml
    project_directory: .
  - path: ./services/unity-catalog.yaml
    project_directory: .
  - path: ./services/mlflow.yaml
    project_directory: .
  - path: ./services/notebooks.yaml
    project_directory: .
  - path: ./services/lineage-service.yaml
    project_directory: .
  - path: ./services/hydrofoil.yaml
    project_directory: .
  # Marquez web UI pointed at lineage-service's Marquez-compatible read API.
  - path: ./services/marquez-web.yaml
    project_directory: .
