# Jaeger all-in-one — the SHARED, app-level telemetry collector.
#
# Unlike the other desktop fragments, this is NOT part of any environment's
# compose project. It is started once (lazily, by the first observability-enabled
# environment) and lives for the desktop app's lifetime, collecting traces from
# every environment's in-process engine so telemetry can be reasoned about across
# environments. Spans are tagged with environment.id for per-env filtering in the
# Jaeger UI.
#
# Ports (host): 16686 = Jaeger UI, 4318 = OTLP/HTTP ingest, 4317 = OTLP/gRPC
# ingest (Envoy's OpenTelemetry tracer uses the gRPC path).
services:
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_OTLP_HTTP_PORT:-4318}:4318"
      - "${JAEGER_OTLP_GRPC_PORT:-4317}:4317"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://127.0.0.1:14269/ || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
