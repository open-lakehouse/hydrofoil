# Marquez (OpenLineage backend API + web UI) for the DESKTOP stack.
#
# Self-contained, profile-free fragment (the live-stack marquez.yaml gates these
# behind a compose profile; the desktop generated compose wants them always-on).
# Shares the `db` instance via its own `marquez` role + database (created by
# docker/db/init/01-create-databases.sql). No host ports — reached via Envoy.
#
# Tracing: the marquez-otel shim image bakes the OTel Java agent; JAVA_TOOL_OPTIONS
# attaches it (the JVM honors that var regardless of entrypoint). OTEL_* drive it;
# OTEL_EXPORTER_OTLP_ENDPOINT (base var → agent appends /v1/traces) is injected by
# env-modules to the host's shared Jaeger, and is a no-op when unset.
services:
  marquez-api:
    image: open-lakehouse/marquez-otel:local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      MARQUEZ_PORT: 5000
      MARQUEZ_ADMIN_PORT: 5001
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      SEARCH_ENABLED: "false"
      JAVA_TOOL_OPTIONS: "-javaagent:/otel/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: marquez
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_COLLECTOR_HTTP:-}
      OTEL_PROPAGATORS: tracecontext,baggage
    expose:
      - "5000"
      - "5001"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5001/healthcheck || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  marquez-web:
    image: marquezproject/marquez-web:0.50.0
    restart: unless-stopped
    depends_on:
      marquez-api:
        condition: service_healthy
    environment:
      WEB_PORT: 3000
      MARQUEZ_HOST: marquez-api
      MARQUEZ_PORT: 5000
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/healthcheck || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
