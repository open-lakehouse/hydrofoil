# Envoy gateway — contributed by the `local-stack-envoy` component.
# `docker compose --profile svc up` brings up everything on the `svc` profile.
services:
  envoy:
    image: envoyproxy/envoy:v1.38-latest
    restart: unless-stopped
    command: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "warn"]
    configs:
      - source: envoy_config
        target: /etc/envoy/envoy.yaml
    ports:
      - "${ENVOY_PORT:-9080}:10000"
      - "9901:9901"
