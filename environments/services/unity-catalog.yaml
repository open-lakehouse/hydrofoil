# Unity Catalog OSS (Java) server, backed by Postgres (db: unitycatalog)

services:
  unity-catalog:
    image: ghcr.io/roeap/unitycatalog:v0.0.0-dev-3
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: ["./bin/start-uc-server"]
    ports:
      - "${UC_PORT:-8081}:8081"
    configs:
      - source: uc_server_properties
        target: /home/unitycatalog/etc/conf/server.properties
      - source: uc_hibernate_properties
        target: /home/unitycatalog/etc/conf/hibernate.properties
    healthcheck:
      # no curl in the image -> bash /dev/tcp probe (the image ships bash)
      test:
        ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/8081' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
