# Marquez — the OpenLineage reference backend (API + web UI).
#
# Shares the `db` instance (postgres:16) with Unity Catalog and MLflow, using its
# own `marquez` role + database (created by docker/db/init/01-create-databases.sql).
# Logical isolation lives at the database level; a separate server process isn't
# needed at demo scale. Marquez's CI baseline is pg14, but its Flyway migrations
# run fine on pg16.
#
# The image's baked-in marquez.dev.yml hardcodes the db user/password/name to
# `marquez` and only interpolates POSTGRES_HOST/POSTGRES_PORT — hence the matching
# `marquez` role in the init script, and why only host/port are set below.
#
# No host ports are published; access is via the Envoy gateway
# (API by path prefix `/api/v1/lineage`, web UI by its dedicated root listener).
services:
  marquez-api:
    image: marquezproject/marquez:0.50.0
    restart: unless-stopped
    profiles: [svc, full]
    depends_on:
      db:
        condition: service_healthy
    environment:
      MARQUEZ_PORT: 5000
      MARQUEZ_ADMIN_PORT: 5001
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      SEARCH_ENABLED: "false"
    expose:
      - "5000"
      - "5001"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5001/healthcheck || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  marquez-web:
    image: marquezproject/marquez-web:0.50.0
    restart: unless-stopped
    profiles: [svc, full]
    depends_on:
      marquez-api:
        condition: service_healthy
    environment:
      # The web server's own listen port (setupProxy.js reads WEB_PORT)...
      WEB_PORT: 3000
      # ...and where it proxies /api/* to.
      MARQUEZ_HOST: marquez-api
      MARQUEZ_PORT: 5000
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/healthcheck || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
