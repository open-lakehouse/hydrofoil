# Marquez — the OpenLineage reference backend (API + web UI).
#
# Runs with its OWN postgres:14 rather than the shared `db` (postgres:16):
# Marquez tests/migrates against pg14, and isolating it keeps the lineage
# sidecar's schema and lifecycle decoupled from the catalog's authoritative
# store. See docs/adr — environment design.
#
# No host ports are published; access is via the Envoy gateway
# (API by path prefix `/api/v1/lineage`, web UI by its dedicated root listener).
services:
  marquez-db:
    image: postgres:14
    restart: unless-stopped
    profiles: [svc, full]
    environment:
      POSTGRES_USER: ${MARQUEZ_DB_USER:-marquez}
      POSTGRES_PASSWORD: ${MARQUEZ_DB_PASSWORD:-marquez}
      POSTGRES_DB: ${MARQUEZ_DB:-marquez}
    volumes:
      - ./.data/marquez-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MARQUEZ_DB_USER:-marquez} -d ${MARQUEZ_DB:-marquez}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  marquez-api:
    image: marquezproject/marquez:0.50.0
    restart: unless-stopped
    profiles: [svc, full]
    depends_on:
      marquez-db:
        condition: service_healthy
    # The image entrypoint renders marquez.yml from these env vars.
    environment:
      MARQUEZ_PORT: 5000
      MARQUEZ_ADMIN_PORT: 5001
      POSTGRES_HOST: marquez-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${MARQUEZ_DB:-marquez}
      POSTGRES_USER: ${MARQUEZ_DB_USER:-marquez}
      POSTGRES_PASSWORD: ${MARQUEZ_DB_PASSWORD:-marquez}
      SEARCH_ENABLED: "false"
    expose:
      - "5000"
      - "5001"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5001/healthcheck || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  marquez-web:
    image: marquezproject/marquez-web:0.50.0
    restart: unless-stopped
    profiles: [svc, full]
    depends_on:
      marquez-api:
        condition: service_healthy
    environment:
      # The web server's own listen port (setupProxy.js reads WEB_PORT)...
      WEB_PORT: 3000
      # ...and where it proxies /api/* to.
      MARQUEZ_HOST: marquez-api
      MARQUEZ_PORT: 5000
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/healthcheck || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
