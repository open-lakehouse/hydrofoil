name: open-lakehouse-tauri

# Minimal backend stack for the Tauri desktop app (node/desktop).
#
# The desktop app runs its own UI and hosts the portal Files+Tags and the
# hydrofoil QueryService IN-PROCESS on the Mac. What it can't host in-process are
# the two auxiliary backend services a real lakehouse session expects:
#   - MLflow  — experiment tracking / model registry / traces
#   - Marquez — OpenLineage lineage (backend API + web UI)
#
# Both are Postgres-backed (SQLite would drop features) against a single shared
# `db`. Storage is Azurite (Azure Blob emulator), which also backs MLflow's
# artifacts via a wasbs:// URL. Everything is fronted by an Envoy gateway that
# exposes Databricks-parallel API paths (/api/2.0/mlflow*, /v1/traces, /api/v1).
#
# Deliberately excluded vs the live stack: the Unity Catalog server, marimo,
# the hydrofoil container, and the Rust lineage-service (we run the Java Marquez
# backend here instead).
#
# Bring up:   just env-up tauri
# Tear down:  just env-down tauri
#
# Endpoints (host):
#   MLflow API : http://localhost:${ENVOY_PORT:-9080}/api/2.0/mlflow/...
#   MLflow UI  : http://localhost:${ENVOY_PORT:-9080}/mlflow
#   Marquez API: http://localhost:${ENVOY_PORT:-9080}/api/v1/...
#   Lineage UI : http://localhost:${ENVOY_PORT:-9080}/

configs:
  envoy_config:
    file: ./config/tauri/envoy.yaml

include:
  - path: ./services/envoy.yaml
    project_directory: .
  - path: ./services/postgres.yaml
    project_directory: .
  - path: ./services/azurite.yaml
    project_directory: .
  - path: ./services/mlflow.yaml
    project_directory: .

services:
  # --- MLflow artifact override -------------------------------------------
  # services/mlflow.yaml defaults to S3 (s3://mlflow + AWS_* creds) for the live
  # stack. Here we re-declare the service to point artifacts at Azurite blob via
  # a wasbs:// URL; compose deep-merges this over the included fragment. The
  # AZURE_STORAGE_CONNECTION_STRING is the well-known Azurite emulator string
  # (see services/azurite.yaml) whose BlobEndpoint redirects the Azure SDK to
  # the azurite container. The `-full` MLflow image bundles azure-storage-blob.
  mlflow:
    command:
      - "mlflow"
      - "server"
      - "--backend-store-uri"
      - "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/mlflow"
      - "--artifacts-destination"
      - "wasbs://${AZURITE_CONTAINER:-lakehouse}@devstoreaccount1.blob.core.windows.net/mlflow"
      - "--serve-artifacts"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "5000"
      - "--static-prefix"
      - "${MLFLOW_STATIC_PREFIX:-/mlflow}"
    # Replace the inherited AWS_* environment with the Azurite connection string.
    environment:
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
      AZURE_STORAGE_CONNECTION_STRING: >-
        DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;
    depends_on:
      db:
        condition: service_healthy
      azurite-init:
        condition: service_completed_successfully

  # --- Marquez (Java backend + web UI) ------------------------------------
  # Profile-free copy of services/marquez.yaml. The shared fragment gates both
  # services behind `profiles: [svc, full]`; the generic `just env-up tauri`
  # recipe can't pass `--profile`, so they're inlined here without the gate.
  # Shares the `db` instance using its own `marquez` role + database, created by
  # docker/db/init/01-create-databases.sql on a fresh volume.
  marquez-api:
    image: marquezproject/marquez:0.50.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      MARQUEZ_PORT: 5000
      MARQUEZ_ADMIN_PORT: 5001
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      SEARCH_ENABLED: "false"
    expose:
      - "5000"
      - "5001"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5001/healthcheck || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  marquez-web:
    image: marquezproject/marquez-web:0.50.0
    restart: unless-stopped
    depends_on:
      marquez-api:
        condition: service_healthy
    environment:
      # The web server's own listen port (setupProxy.js reads WEB_PORT)...
      WEB_PORT: 3000
      # ...and where it proxies /api/* to.
      MARQUEZ_HOST: marquez-api
      MARQUEZ_PORT: 5000
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/healthcheck || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
