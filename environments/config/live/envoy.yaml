static_resources:
  listeners:
    # ---- Main API listener -------------------------------------------------
    - name: gateway_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      traffic_direction: INBOUND
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                generate_request_id: true
                codec_type: AUTO
                upgrade_configs:
                  upgrade_type: "websocket"
                stat_prefix: ingress_http
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: api_routes
                  virtual_hosts:
                    - name: apis
                      domains:
                        - "*"
                      routes:
                        # Unity Catalog REST API (Databricks-parallel root path).
                        - match:
                            prefix: "/api/2.1/unity-catalog"
                          route:
                            cluster: unity_catalog
                          decorator:
                            operation: unity_catalog
                        # MLflow REST API (Databricks-parallel root path). MLflow
                        # runs with --static-prefix /mlflow, so the API lives at
                        # /mlflow/api/2.0/mlflow; rewrite to keep it at root. This
                        # single prefix also covers /api/2.0/mlflow-artifacts.
                        - match:
                            prefix: "/api/2.0/mlflow"
                          route:
                            cluster: mlflow
                            prefix_rewrite: "/mlflow/api/2.0/mlflow"
                          decorator:
                            operation: mlflow_api
                        # MLflow OTLP/HTTP trace ingestion (root, OTLP convention).
                        - match:
                            prefix: "/v1/traces"
                          route:
                            cluster: mlflow
                            prefix_rewrite: "/mlflow/v1/traces"
                          decorator:
                            operation: mlflow_traces
                        # MLflow web UI (served by MLflow under --static-prefix
                        # /mlflow: UI, /ajax-api, static assets, /health).
                        - match:
                            prefix: "/mlflow"
                          route:
                            cluster: mlflow
                          decorator:
                            operation: mlflow_ui
                        # marimo notebook editor UI (served under --base-url
                        # /marimo). Long-lived editor WebSocket -> no route timeout.
                        - match:
                            prefix: "/marimo"
                          route:
                            cluster: marimo
                            timeout: 0s
                          decorator:
                            operation: marimo

  clusters:
    - name: unity_catalog
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: unity_catalog
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: unity-catalog
                      port_value: 8081

    - name: mlflow
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: mlflow
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: mlflow
                      port_value: 5000

    - name: marimo
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: marimo
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: marimo
                      port_value: 2718
                          