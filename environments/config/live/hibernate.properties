# Unity Catalog persistence -> Postgres (service `db`, database `unitycatalog`).
# NOTE: this file is NOT shell-interpolated; values are literal. Keep the user/password
# in sync with the POSTGRES_USER/POSTGRES_PASSWORD defaults in environments/.env.
hibernate.connection.driver_class=org.postgresql.Driver
hibernate.connection.url=jdbc:postgresql://db:5432/unitycatalog
hibernate.connection.user=postgres
hibernate.connection.password=postgres
hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Auto-create / migrate the UC schema in the `unitycatalog` DB on first boot.
hibernate.hbm2ddl.auto=update
hibernate.show_sql=false
