# lineage-service configuration (host-local run against the DEPLOYED Unity Catalog).
#
# Pass this file as the binary's first argument (or via LINEAGE_CONFIG). The
# deployed UC stack lives in the unitycatalog-quickstart repo (`just deploy-ecs`);
# see ./README.md for the full setup. Any field may be overridden by a
# `LINEAGE__*` environment variable, e.g. `LINEAGE__PORT=9000` or
# `LINEAGE__DELTA__TABLE=events_mine`. Secrets (UNITY_CATALOG_TOKEN) are supplied
# via the environment, never here.

# HTTP listen port for ingest (/api/v1/lineage) and the Marquez read API (/api/v1).
port = 8091

# Lakehouse sinks to fan events out to.
sinks = ["delta"]

[delta]
# Catalog-managed (commit-coordinated) table on the deployed UC server.
# Requires the `unity` cargo feature (on by default).
mode = "unity-managed"
catalog = "demo"
schema = "lineage"
# Deliberately NOT `events` — that table belongs to the ECS-deployed
# lineage-service. A separate table keeps local test events out of the live
# lineage graph. Auto-created on first run (delta.auto_create defaults to true).
table = "events_local"
# endpoint is intentionally unset: the deployed ALB / custom-domain URL changes
# per deploy, so supply it via the UNITY_CATALOG_URL env var (the full REST base,
# e.g. "${UC_SERVER%/}/api/2.1/unity-catalog/"). Token via UNITY_CATALOG_TOKEN;
# region via AWS_REGION (the deployed bucket's region).

[writer]
# Flush promptly during manual validation.
buffer_size = 100
flush_interval_ms = 500
channel_capacity = 1000

# Object-store options forwarded to the writer. S3 credentials are vended by UC
# (no AWS keys needed locally); UNITY_CATALOG_* / AWS_REGION are layered in from
# the environment at load time, so this table stays empty.
[storage_options]
