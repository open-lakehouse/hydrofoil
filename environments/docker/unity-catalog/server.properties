server.env=dev

# S3 / SeaweedFS credential vending.
# The UC Spark connector always calls generateTemporaryPathCredentials when creating tables,
# so UC must have an S3 bucket configuration that matches the table's storage location
# (here s3://unity). Setting s3.sessionToken.0 (any non-empty value) makes UC return these
# STATIC credentials directly instead of attempting an STS AssumeRole — the right mode for a
# local SeaweedFS/MinIO store. The endpoint itself is redirected to SeaweedFS by the
# AWS_ENDPOINT_URL_S3 env var (see services/unity-catalog.yaml); the image's S3EndpointResolver
# also propagates path-style addressing into the client config handed back to Spark.
s3.bucketPath.0=s3://unity
s3.region.0=us-east-1
s3.accessKey.0=seaweedfs
s3.secretKey.0=seaweedfs
s3.sessionToken.0=local
