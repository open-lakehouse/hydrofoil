# Envoy gateway for the `environments/` dev stack.
#
# MLflow runs with `--static-prefix /mlflow` and marimo with `--base-url /marimo`
# (see services/mlflow.yaml + services/notebooks.yaml), so every path those apps
# serve lives under that prefix. Envoy re-exposes the MLflow REST API and OTLP
# ingestion at Databricks-parallel root paths via `prefix_rewrite`.
#
# Topology:
#   - Main listener (:10000): Databricks-style path-prefix routes for the HTTP
#     APIs that the host-run hydrofoil server and notebooks call —
#       /api/v1/lineage       -> marquez-api  (OpenLineage event ingestion)
#       /api/v1               -> marquez-api  (rest of the Marquez REST API)
#       /api/2.1/unity-catalog -> unity-catalog
#       /api/2.0/mlflow        -> mlflow      (rewritten to /mlflow/api/2.0/mlflow)
#       /v1/traces             -> mlflow      (rewritten to /mlflow/v1/traces)
#       /mlflow                -> mlflow      (web UI)
#       /marimo                -> marimo      (notebook editor UI; WebSocket-upgraded)
#   - Dedicated listeners for the browser UIs, each serving the app's own prefix:
#       :10110 /          -> marquez-web (Marquez lineage UI)
#       :10120 /mlflow    -> mlflow      (MLflow UI *and* OTLP ingestion at /mlflow/v1/traces)
#       :10130 /marimo    -> marimo      (marimo notebook editor UI; WebSocket-upgraded)
#
# No Jaeger. Self-tracing of the gateway is omitted for now: MLflow only accepts
# OTLP over HTTP (Envoy's OTel tracer prefers gRPC), and the server emits its own
# spans, so a gateway tracer adds complexity without much value here. Re-add an
# `envoy.tracers.opentelemetry` http_service -> mlflow /mlflow/v1/traces if gateway
# spans are wanted.

static_resources:
  listeners:
    # ---- Main API listener -------------------------------------------------
    - name: gateway_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      traffic_direction: INBOUND
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                generate_request_id: true
                codec_type: AUTO
                upgrade_configs:
                  upgrade_type: "websocket"
                stat_prefix: ingress_http
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: api_routes
                  virtual_hosts:
                    - name: apis
                      domains:
                        - "*"
                      routes:
                        # Hydrofoil ConnectRPC QueryService (server-streaming
                        # SQL). Connect RPC paths are rooted at the fully-qualified
                        # service name; it's plain HTTP POST so no gRPC-web filter
                        # is needed. A streamed query can run long, so disable the
                        # per-route timeout (as the marimo WebSocket route does).
                        - match:
                            prefix: "/hydrofoil.query.v1.QueryService/"
                          route:
                            cluster: hydrofoil
                            timeout: 0s
                          decorator:
                            operation: hydrofoil_query
                        # OpenLineage ingestion (POST /api/v1/lineage) + the rest
                        # of the Marquez REST API both live under /api/v1.
                        - match:
                            prefix: "/api/v1"
                          route:
                            cluster: marquez_api
                          decorator:
                            operation: marquez_api
                        # Unity Catalog REST API (Databricks-parallel root path).
                        - match:
                            prefix: "/api/2.1/unity-catalog"
                          route:
                            cluster: unity_catalog
                          decorator:
                            operation: unity_catalog
                        # MLflow REST API (Databricks-parallel root path). MLflow
                        # runs with --static-prefix /mlflow, so the API lives at
                        # /mlflow/api/2.0/mlflow; rewrite to keep it at root. This
                        # single prefix also covers /api/2.0/mlflow-artifacts.
                        - match:
                            prefix: "/api/2.0/mlflow"
                          route:
                            cluster: mlflow
                            prefix_rewrite: "/mlflow/api/2.0/mlflow"
                          decorator:
                            operation: mlflow_api
                        # MLflow OTLP/HTTP trace ingestion (root, OTLP convention).
                        - match:
                            prefix: "/v1/traces"
                          route:
                            cluster: mlflow
                            prefix_rewrite: "/mlflow/v1/traces"
                          decorator:
                            operation: mlflow_traces
                        # MLflow web UI (served by MLflow under --static-prefix
                        # /mlflow: UI, /ajax-api, static assets, /health).
                        - match:
                            prefix: "/mlflow"
                          route:
                            cluster: mlflow
                          decorator:
                            operation: mlflow_ui
                        # marimo notebook editor UI (served under --base-url
                        # /marimo). Long-lived editor WebSocket -> no route timeout.
                        - match:
                            prefix: "/marimo"
                          route:
                            cluster: marimo
                            timeout: 0s
                          decorator:
                            operation: marimo

    # ---- Marquez web UI (root listener) ------------------------------------
    - name: marquez_ui_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10110
      traffic_direction: INBOUND
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                generate_request_id: true
                codec_type: AUTO
                upgrade_configs:
                  upgrade_type: "websocket"
                stat_prefix: ingress_http
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: marquez_ui_routes
                  virtual_hosts:
                    - name: marquez_ui
                      domains:
                        - "*"
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: marquez_web
                          decorator:
                            operation: marquez_web

    # ---- MLflow UI + OTLP trace ingestion (root listener) ------------------
    - name: mlflow_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10120
      traffic_direction: INBOUND
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                generate_request_id: true
                codec_type: AUTO
                upgrade_configs:
                  upgrade_type: "websocket"
                stat_prefix: ingress_http
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: mlflow_routes
                  virtual_hosts:
                    - name: mlflow
                      domains:
                        - "*"
                      routes:
                        # MLflow serves under --static-prefix /mlflow now (UI at
                        # /mlflow, OTLP ingestion at /mlflow/v1/traces).
                        - match:
                            prefix: "/mlflow"
                          route:
                            cluster: mlflow
                          decorator:
                            operation: mlflow

    # ---- Marimo notebook editor UI (root listener) -------------------------
    - name: marimo_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10130
      traffic_direction: INBOUND
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                generate_request_id: true
                codec_type: AUTO
                upgrade_configs:
                  upgrade_type: "websocket"
                stat_prefix: ingress_http
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: marimo_routes
                  virtual_hosts:
                    - name: marimo
                      domains:
                        - "*"
                      routes:
                        # marimo serves under --base-url /marimo now.
                        - match:
                            prefix: "/marimo"
                          route:
                            cluster: marimo
                            # marimo holds a long-lived WebSocket; disable the
                            # per-route timeout so the editor connection isn't
                            # dropped after the default 15s.
                            timeout: 0s
                          decorator:
                            operation: marimo

  clusters:
    - name: marquez_api
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: marquez_api
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: marquez-api
                      port_value: 5000

    - name: marquez_web
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: marquez_web
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: marquez-web
                      port_value: 3000

    - name: mlflow
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: mlflow
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: mlflow
                      port_value: 5000

    - name: unity_catalog
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: unity_catalog
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: unity-catalog
                      port_value: 8081

    - name: marimo
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: marimo
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: marimo
                      port_value: 2718

    # Hydrofoil HTTP query surface (POST /query + ConnectRPC QueryService).
    - name: hydrofoil
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: hydrofoil
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: hydrofoil
                      port_value: 9082
