# Envoy gateway for the `environments/` dev stack.
#
# Topology:
#   - Main listener (:10000): path-prefix routes for HTTP APIs that the
#     host-run hydrofoil server and notebooks call —
#       /api/v1/lineage  -> marquez-api   (OpenLineage event ingestion)
#       /api/v1          -> marquez-api   (rest of the Marquez REST API)
#       /api/2.1/unity-catalog -> unity-catalog
#   - Dedicated ROOT listeners for prefix-unfriendly browser UIs / ingestion
#     endpoints, each serving "/" so app asset/redirect paths don't break:
#       :10110 -> marquez-web (Marquez lineage UI)
#       :10120 -> mlflow      (MLflow UI *and* OTLP/HTTP trace ingestion at /v1/traces)
#
# No Jaeger. Self-tracing of the gateway is omitted for now: MLflow only accepts
# OTLP over HTTP (Envoy's OTel tracer prefers gRPC), and the server emits its own
# spans, so a gateway tracer adds complexity without much value here. Re-add an
# `envoy.tracers.opentelemetry` http_service -> mlflow /v1/traces if gateway
# spans are wanted.

static_resources:
  listeners:
    # ---- Main API listener -------------------------------------------------
    - name: gateway_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      traffic_direction: INBOUND
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                generate_request_id: true
                codec_type: AUTO
                upgrade_configs:
                  upgrade_type: "websocket"
                stat_prefix: ingress_http
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: api_routes
                  virtual_hosts:
                    - name: apis
                      domains:
                        - "*"
                      routes:
                        # OpenLineage ingestion (POST /api/v1/lineage) + the rest
                        # of the Marquez REST API both live under /api/v1.
                        - match:
                            prefix: "/api/v1"
                          route:
                            cluster: marquez_api
                          decorator:
                            operation: marquez_api
                        # Unity Catalog REST API.
                        - match:
                            prefix: "/api/2.1/unity-catalog"
                          route:
                            cluster: unity_catalog
                          decorator:
                            operation: unity_catalog

    # ---- Marquez web UI (root listener) ------------------------------------
    - name: marquez_ui_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10110
      traffic_direction: INBOUND
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                generate_request_id: true
                codec_type: AUTO
                upgrade_configs:
                  upgrade_type: "websocket"
                stat_prefix: ingress_http
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: marquez_ui_routes
                  virtual_hosts:
                    - name: marquez_ui
                      domains:
                        - "*"
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: marquez_web
                          decorator:
                            operation: marquez_web

    # ---- MLflow UI + OTLP trace ingestion (root listener) ------------------
    - name: mlflow_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10120
      traffic_direction: INBOUND
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                generate_request_id: true
                codec_type: AUTO
                upgrade_configs:
                  upgrade_type: "websocket"
                stat_prefix: ingress_http
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: mlflow_routes
                  virtual_hosts:
                    - name: mlflow
                      domains:
                        - "*"
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: mlflow
                          decorator:
                            operation: mlflow

  clusters:
    - name: marquez_api
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: marquez_api
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: marquez-api
                      port_value: 5000

    - name: marquez_web
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: marquez_web
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: marquez-web
                      port_value: 3000

    - name: mlflow
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: mlflow
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: mlflow
                      port_value: 5000

    - name: unity_catalog
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: unity_catalog
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: unity-catalog
                      port_value: 8081
