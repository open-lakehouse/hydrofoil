version: v2
managed:
  enabled: true
inputs:
  - directory: proto/delta-connect/
    types:
      - "delta.connect.DeltaCommand"
  - directory: proto/spark-connect/
    types:
      - "spark.connect.DataType"
plugins:
  - remote: buf.build/community/neoeinstein-prost:v0.5.0
    out: crates/common/src/gen
    opt:
      - bytes=.
      - compile_well_known_types=true
      # - extern_path=.google.protobuf=::pbjson_types
      - file_descriptor_set=false
      - enable_type_names=true
