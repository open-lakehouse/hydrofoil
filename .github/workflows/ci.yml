name: CI

on:
  merge_group:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Least privilege by default; jobs opt into more if they ever need it.
permissions: {}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: "0"

jobs:
  ci:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # edition 2024 / rust-version 1.91 (see the workspace Cargo.toml). The pin
      # tracks that floor so CI fails the same way a local 1.91 build would.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.91"
          components: rustfmt, clippy

      # Caches ~/.cargo and ./target keyed on the lockfile; first run warms it,
      # later runs skip recompiling the (large) git dependency tree.
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.0

      - name: Format
        run: cargo fmt --all --check

      # The same gate enforced locally: deny all warnings across every target and
      # feature (incl. `governance` and the opt-in `tpcds` bench scaffolding).
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      # Live-integration tests (UC / OCI registry / a running hydrofoil) are
      # marked #[ignore], so the default run needs no services.
      - name: Test
        run: cargo test --workspace --all-features
