name: Release Docker Images

# Build and publish the workspace's service images to the GitHub Container
# Registry. Modelled on unitycatalog/unitycatalog's docker-build.yml, adapted
# to this repo: the matrix axis is the *binary* (one shared docker/Dockerfile
# selects it via `--build-arg BIN=`), each binary gets its own GHCR image, and
# we publish to GHCR only (keyless GITHUB_TOKEN — no stored registry secret).
#
# A `v*` tag push builds multi-arch (amd64 + native arm64), pushes each arch by
# digest, then a merge job assembles the multi-arch manifest list, applies the
# tags, and signs the index keyless via cosign. PRs / main pushes build for
# validation but do not publish (see the `build` job's `if:` gate).

on:
  push:
    tags: ["v*"]
    branches: [main]
    # Limit branch/main builds to inputs that actually affect the image. Tag
    # pushes ignore `paths` and always run. (Rust-workspace equivalents of the
    # sbt-specific list in the UC workflow.)
    paths:
      - crates/**
      - Cargo.toml
      - Cargo.lock
      - docker/**
      - .dockerignore
      - .github/workflows/docker-release.yml
  pull_request:
    branches: [main]
    paths:
      - crates/**
      - Cargo.toml
      - Cargo.lock
      - docker/**
      - .dockerignore
      - .github/workflows/docker-release.yml
  workflow_dispatch: {}

# Cancel superseded runs on the same ref (matches ci.yml / zizmor.yml).
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Least privilege by default; jobs opt into more.
permissions: {}

jobs:
  # Build each (binary, platform) on its NATIVE runner and push BY DIGEST (no
  # tags). Native arm64 avoids slow QEMU emulation of the Rust/cargo compile.
  build:
    name: Build ${{ matrix.bin }} (${{ matrix.platform.arch }})
    runs-on: ${{ matrix.platform.runner }}

    # Publish from the canonical repo on pushes to main / tags, not on PRs.
    if: ${{ contains(fromJSON('["push", "workflow_dispatch"]'), github.event_name) && github.repository == 'open-lakehouse/hydrofoil' && (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main') }}

    permissions:
      contents: read
      packages: write   # push to ghcr.io with GITHUB_TOKEN
      id-token: write   # build provenance / SBOM attestations

    strategy:
      fail-fast: false
      matrix:
        bin: [hydrofoil, lineage-service]
        platform:
          - arch: amd64
            os: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            os: linux/arm64
            runner: ubuntu-24.04-arm   # native arm64 hosted runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # OCI labels + manifest-level annotations for the per-arch image. (Index-
      # level annotations are applied later in the merge job.)
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest
        with:
          images: ghcr.io/open-lakehouse/${{ matrix.bin }}
          labels: |
            org.opencontainers.image.title=${{ matrix.bin }}
            org.opencontainers.image.description=open-lakehouse ${{ matrix.bin }} service
            org.opencontainers.image.vendor=open-lakehouse
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=https://github.com/open-lakehouse/hydrofoil

      # Build + push by digest only (no tags here — the merge job assembles the
      # multi-arch manifest list and applies the tags). Per-(bin,arch) cache
      # scope so concurrent matrix builds do not clobber each other's gha cache.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile
          build-args: |
            BIN=${{ matrix.bin }}
          platforms: ${{ matrix.platform.os }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          outputs: type=image,name=ghcr.io/open-lakehouse/${{ matrix.bin }},push-by-digest=true,name-canonical=true,push=true
          sbom: true
          provenance: mode=max
          cache-from: type=gha,scope=${{ matrix.bin }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.bin }}-${{ matrix.platform.arch }}

      - name: Export digest
        # Route the digest through env (not inline ${{ }}) so it is never
        # spliced into the shell — keeps the template-injection audit clean.
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.bin }}-${{ matrix.platform.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Assemble the per-arch digests into one multi-arch manifest list per binary,
  # apply the tags, then sign the resulting index by digest (keyless).
  merge:
    name: Merge and sign (${{ matrix.bin }})
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write   # cosign keyless signing

    strategy:
      fail-fast: false
      matrix:
        bin: [hydrofoil, lineage-service]

    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-${{ matrix.bin }}-*
          merge-multiple: true
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tagging strategy:
      #   tag push v* -> <version> (e.g. 1.2.3) + the raw git tag + `latest`
      #   main push   -> `main`, `main-<sha>`, and `edge` (latest dev build);
      #                  never `latest`
      # DOCKER_METADATA_ANNOTATIONS_LEVELS=index emits index-level OCI
      # annotations (manifest-level labels from a per-arch build do NOT
      # propagate to the multi-arch index created by imagetools).
      - name: Generate metadata and tags
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index
        with:
          images: ghcr.io/open-lakehouse/${{ matrix.bin }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=tag
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}
          flavor: |
            latest=auto
          labels: |
            org.opencontainers.image.title=${{ matrix.bin }}
            org.opencontainers.image.description=open-lakehouse ${{ matrix.bin }} service
            org.opencontainers.image.vendor=open-lakehouse
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=https://github.com/open-lakehouse/hydrofoil

      # Create the manifest list referencing the per-arch digests, for each tag.
      # Index-level OCI annotations from metadata-action are applied here (they
      # cannot be set on the index by the per-arch build step).
      - name: Create and push manifest list
        working-directory: /tmp/digests
        env:
          IMAGE: ghcr.io/open-lakehouse/${{ matrix.bin }}
        run: |
          # Build arrays so no unquoted word-splitting is needed.
          mapfile -t tags < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          tag_args=(); for t in "${tags[@]}"; do tag_args+=(-t "$t"); done
          ann_args=()
          while IFS= read -r a; do
            [ -n "$a" ] && ann_args+=(--annotation "$a")
          done <<< "$DOCKER_METADATA_OUTPUT_ANNOTATIONS"
          srcs=(); for d in *; do srcs+=("${IMAGE}@sha256:${d}"); done
          docker buildx imagetools create "${tag_args[@]}" "${ann_args[@]}" "${srcs[@]}"

      - name: Inspect and capture index digest
        id: digest
        run: |
          ref=$(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          docker buildx imagetools inspect "$ref"
          d=$(docker buildx imagetools inspect "$ref" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "index=$d" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Keyless signing via GitHub OIDC (Fulcio/Rekor). Sign each distinct
      # repo@indexDigest once.
      - name: Sign images (keyless)
        env:
          DIGEST: ${{ steps.digest.outputs.index }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "$TAGS" | sed "s/:.*\$/@$DIGEST/" | sort -u | \
            xargs --no-run-if-empty cosign sign --yes
