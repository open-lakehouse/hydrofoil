networks:
  hydrofoil:

services:
  gateway:
    image: envoyproxy/envoy:contrib-distroless-v1.37-latest
    networks:
      - hydrofoil
    ports:
      - 10000:10000
      - 10100:10100
      - 10101:10101
    volumes:
      - ./config/network/gateway.yaml:/etc/envoy/envoy.yaml

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.14.1
    command: ["--set=extensions.jaeger_query.base_path=/jaeger"]
    networks:
      - hydrofoil
    ports:
      - 16686
      - 4317

  # Storage Service - SeaweedFS
  # - provides S3 compatible object storage
  # - used as storage backend for other services
  seaweedfs:
    profiles: [s3, storage, oci, full]
    image: chrislusf/seaweedfs
    command: "mini -ip.bind=0.0.0.0 -dir=/data"
    networks:
      - hydrofoil
    env_file: ./config/environment/seaweedfs.env
    ports:
      - 8333 # S3 API
      - 23646 # Admin UI
    volumes:
      - ./.mounts/seaweedfs:/data
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "-q",
          "http://localhost:9333/cluster/status",
        ]
      interval: 1s
      timeout: 5s
      retries: 5
      start_period: 0s
    restart: unless-stopped

  # Init OCI Registry Bucket
  # - creates the bucket used by the OCI registry
  # - bucket name must match the configuration in oci_registry config.json
  oci_init:
    profiles: [oci, full]
    image: amazon/aws-cli
    entrypoint: |
      sh -c '
      if ! aws s3 ls s3://oci-registry >/dev/null 2>&1; then
        aws s3 mb s3://oci-registry
      fi
      '
    depends_on:
      seaweedfs:
        condition: service_healthy
    networks:
      - hydrofoil
    environment:
      - AWS_DEFAULT_REGION=hydrofoil
      - AWS_ENDPOINT_URL=http://seaweedfs:8333
    env_file: ./config/environment/seaweedfs.env

  oci_registry:
    profiles: [oci, full]
    image: ghcr.io/project-zot/zot:latest
    depends_on:
      oci_init:
        condition: service_completed_successfully
    networks:
      - hydrofoil
    env_file: ./config/environment/seaweedfs.env
    ports:
      - 5000
    volumes:
      - ./.mounts/oci_registry:/var/lib/registry
      - ./config/services/oci_registry/config.json:/etc/zot/config.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/v2/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Upload Notation Certificates to Zot
  # - uploads CA certificate to zot's trust store
  # - runs after oci_registry is healthy
  # - enables signature verification for signed OCI artifacts
  # oci_cert_uploader:
  #   profiles: [oci, full]
  #   image: curlimages/curl:latest
  #   depends_on:
  #     oci_registry:
  #       condition: service_healthy
  #   networks:
  #     - hydrofoil
  #   volumes:
  #     - ./config/certificates:/certificates:ro
  #   entrypoint: |
  #     sh -c '
  #     if [ ! -f /certificates/trust/ca.crt ]; then
  #       echo "Warning: CA certificate not found at /certificates/trust/ca.crt"
  #       echo "Please generate certificates first: ./scripts/generate-notation-certs.sh"
  #       exit 0
  #     fi
  #     echo "Uploading CA certificate to zot trust store..."
  #     HTTP_CODE=$$(curl -s -w "%{http_code}" -o /tmp/response.txt \
  #       --data-binary @/certificates/trust/ca.crt \
  #       -X POST "http://oci_registry:5000/v2/_zot/ext/notation?truststoreType=ca")
  #     if [ "$$HTTP_CODE" -eq 200 ] || [ "$$HTTP_CODE" -eq 201 ]; then
  #       echo "✓ CA certificate uploaded successfully (HTTP $$HTTP_CODE)"
  #       cat /tmp/response.txt
  #       exit 0
  #     else
  #       echo "✗ Failed to upload certificate (HTTP $$HTTP_CODE)"
  #       cat /tmp/response.txt
  #       exit 1
  #     fi
  #     '

  postgres:
    profiles: [full]
    image: postgres:16
    networks:
      - hydrofoil
    ports:
      - 5432:5432
    env_file: ./config/environment/pg.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  uc:
    profiles: [full]
    image: unitycatalog-rs:dev
    networks:
      - hydrofoil
    ports:
      - 8080
    command: ["server", "--rest", "--use-db"]
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/postgres
    depends_on:
      seaweedfs:
        condition: service_healthy
      postgres:
        condition: service_healthy
