networks:
  sharing:

services:
  uc:
    profiles: [full]
    image: unitycatalog-rs:dev
    container_name: uc
    hostname: uc
    networks:
      - sharing
    ports:
      - "8080:8080"
    command: ["server", "--rest", "--use-db"]
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/postgres
    depends_on:
      - azurite
      - postgres

  azurite:
    profiles: [azure, storage, full]
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite
    hostname: azurite
    networks:
      - sharing
    ports:
      - "10000:10000"
      # - "10001:10001"
      # - "10002:10002"

  s3:
    profiles: [s3, storage, full]
    image: chrislusf/seaweedfs
    command: "mini -ip.bind=0.0.0.0 -metricsPort=9327"
    environment:
      AWS_ACCESS_KEY_ID: seaweed-key-id
      AWS_SECRET_ACCESS_KEY: seaweed-access-key
    ports:
      - 8333:8333 # S3 API
      # - 9327:9327 # Metrics
      - 23646:23646 # Admin UI

  postgres:
    profiles: [full]
    image: postgres:16
    container_name: postgres
    networks:
      - sharing
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  jaeger:
    profiles: [tracing, full]
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.14.1
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "5778:5778"
      - "9411:9411"
      - 6831:6831/udp
      - 6832:6832/udp
      - 14250:14250
      - 14268:14268
      - 14269:14269
    # environment:
    #   - LOG_LEVEL=debug
    # networks:
    #   - jaeger-example
