networks:
  sharing:

services:
  uc:
    profiles: ["full"]
    image: unitycatalog-rs:dev
    container_name: uc
    hostname: uc
    networks:
      - sharing
    ports:
      - "8080:8080"
    command: ["server", "--rest", "--use-db"]
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/postgres
    depends_on:
      - azurite
      - postgres

  azurite:
    profiles: ["azure", "storage"]
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite
    hostname: azurite
    networks:
      - sharing
    ports:
      - "10000:10000"
      # - "10001:10001"
      # - "10002:10002"

  s3:
    profiles: ["s3", "storage"]
    image: chrislusf/seaweedfs
    command: "mini -ip.bind=0.0.0.0 -metricsPort=9327"
    environment:
      AWS_ACCESS_KEY_ID: seaweed-key-id
      AWS_SECRET_ACCESS_KEY: seaweed-access-key
    ports:
      - 8333:8333 # S3 API
      # - 9327:9327 # Metrics
      - 23646:23646 # Admin UI

  postgres:
    profiles: ["full"]
    image: postgres:16
    container_name: postgres
    networks:
      - sharing
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
