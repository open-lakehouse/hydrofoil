# Spell-check configuration for `crate-ci/typos` (see .github/workflows/typos.yml).

[default]
extend-ignore-re = [
    # Custom ignore regex patterns: https://github.com/crate-ci/typos/blob/master/docs/reference.md#example-configurations
    "(?s)//\\s*spellchecker:ignore-next-line[^\\n]*\\n[^\\n]*",
    # Line block with # spellchecker:<on|off>
    "(?s)(#|//|<\\!--)\\s*spellchecker:off.*?\\n\\s*(#|//|<\\!--)\\s*spellchecker:on",
    "(?Rm)^.*(#|//)\\s*spellchecker:disable-line$",
]

[default.extend-words]
# to avoid having to name fields r#type
typ = "typ"

# We only want typos to police code we own. Three classes of files carry
# intentional or upstream-owned "misspellings" and are excluded here:
#
#   * crates/common/src/gen/** — @generated by prost-build from the vendored
#     Spark Connect protos; edits are overwritten on regeneration.
#   * proto/spark-connect/**   — vendored verbatim from Apache Spark (ASF
#     license header); diverging from upstream would defeat the point.
#   * crates/client/queries/tpcds/** — TPC-DS benchmark query text derived
#     under the TPC Fair Use Policy. Tokens like the `asceding` table alias
#     are part of the standard's text; "correcting" them alters the benchmark.
[files]
extend-exclude = [
    "crates/common/src/gen/",
    "proto/spark-connect/",
    "crates/client/queries/tpcds/",
]
