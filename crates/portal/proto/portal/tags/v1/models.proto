syntax = "proto3";

package portal.tags.v1;

// The assignment of a tag to a lakehouse entity.
//
// Unlike a TagPolicy (a governed-tag *definition*), an assignment is the
// application of a tag to a specific entity. It has no identifier of its own —
// its identity is the composite of (entity_type, entity_name, tag_key).
message EntityTagAssignment {
  // The type of the entity to which the tag is assigned.
  //
  // Supported values: catalogs, schemas, tables, columns, volumes.
  string entity_type = 1;

  // The fully qualified name of the entity to which the tag is assigned.
  string entity_name = 2;

  // The key of the tag.
  string tag_key = 3;

  // The value of the tag (optional).
  optional string tag_value = 4;
}

// An allowed value for a governed tag.
message Value {
  // The name of the allowed value.
  string name = 1;
}

// A governed tag definition (tag policy).
//
// A tag policy defines a tag key together with the rules that govern how it can
// be used, including the optional set of allowed values. Assigning a governed
// tag to an entity is done through the EntityTagAssignments API.
message TagPolicy {
  // The key of the governed tag.
  string tag_key = 1;

  // User-provided free-form text description of the tag policy.
  optional string description = 2;

  // The set of allowed values for the governed tag.
  //
  // When empty, the governed tag does not restrict the values that may be
  // assigned.
  repeated Value values = 3;

  // Unique identifier for the tag policy. Output only; assigned by the server.
  optional string id = 4;

  // Time at which this tag policy was created, in epoch milliseconds.
  // Output only.
  optional int64 created_at = 1000;

  // Time at which this tag policy was last updated, in epoch milliseconds.
  // Output only.
  optional int64 updated_at = 1002;
}
