version: v2
# ConnectRPC / buffa code generation for the portal crate.
#
# Three LOCAL plugins (installed via `cargo install`; see README):
#   - protoc-gen-buffa            -> message types (owned structs + zero-copy views)
#   - protoc-gen-buffa-packaging  -> mod.rs module trees
#   - protoc-gen-connect-rust     -> ConnectRPC service traits + clients
#
# A fully-remote BSR pipeline is not yet available for connect-rust; switch the
# `local:` entries to `remote: buf.build/anthropics/...` once those plugins ship.
managed:
  enabled: true
plugins:
  - local: protoc-gen-buffa
    out: src/generated/buffa
    opt:
      - views=true
      - json=true
  - local: protoc-gen-buffa-packaging
    out: src/generated/buffa
    strategy: all
  - local: protoc-gen-connect-rust
    out: src/generated/connect
    opt:
      - buffa_module=crate::generated::buffa
  - local: protoc-gen-buffa-packaging
    out: src/generated/connect
    strategy: all
    opt:
      - filter=services
